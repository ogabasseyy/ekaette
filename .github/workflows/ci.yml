name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install system audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopus0 libopus-dev

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements-dev.txt is local-only today; keep CI self-contained until it is tracked.
          pip install pytest==9.0.2 pytest-asyncio==1.3.0 pytest-cov==7.0.0 httpx==0.28.1

      - name: Run release gates (strict)
        run: python -m scripts.release_gate --repo-root . --strict

      - name: Check admin architecture invariants
        run: python -m scripts.check_admin_architecture

      - name: Check public architecture invariants
        run: python -m scripts.check_public_architecture

      - name: Check realtime architecture invariants
        run: python -m scripts.check_realtime_architecture

      - name: Run backend tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=15

  frontend:
    name: Frontend (Node 24 + pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        working-directory: frontend
        run: pnpm lint

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm exec vitest run

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
